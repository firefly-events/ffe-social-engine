name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test Node
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm --filter @ffe/dashboard exec playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: pnpm --filter @ffe/dashboard test:e2e
        env:
          CI: true

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 14

      - name: Install Python dependencies
        run: |
          pip install -r services/visual-gen/requirements.txt
          pip install -r services/voice-gen/requirements.txt

      - name: Lint Python
        run: |
          cd services/visual-gen && ruff check .
          cd ../voice-gen && ruff check .

      - name: Test Python
        run: |
          cd services/visual-gen && pytest
          cd ../voice-gen && pytest
