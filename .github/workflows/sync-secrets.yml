name: Sync Secrets to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to sync (dev, prod, or both)'
        required: true
        default: 'both'
        type: choice
        options: [dev, prod, both]
      dry_run:
        description: 'Dry run (show what would change, do not write)'
        required: false
        default: false
        type: boolean
  # Auto-sync when secret scripts change
  push:
    branches: [main]
    paths:
      - 'scripts/secrets/setup-vercel-env.sh'
      - 'scripts/secrets/pull-secrets.sh'

permissions:
  contents: read
  id-token: write  # WIF

env:
  GCP_PROJECT: ffe-cicd
  WIF_PROVIDER: projects/817549545781/locations/global/workloadIdentityPools/ffe-github-pool/providers/github-actions
  WIF_SERVICE_ACCOUNT: ffe-cicd-deployer@ffe-cicd.iam.gserviceaccount.com

jobs:
  sync-secrets:
    name: Sync GCP SM → Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Sync secrets to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_9LvKhV1a433uROYAAXl6lbhV
          VERCEL_PROJECT_ID: prj_JSD2sPXbFcJuYQZutwdbV8FGBMj7
          SYNC_ENV: ${{ github.event.inputs.environment || 'both' }}
          SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          DRY_RUN_FLAG=""
          if [[ "$SYNC_DRY_RUN" == "true" ]]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          chmod +x scripts/secrets/setup-vercel-env.sh
          ./scripts/secrets/setup-vercel-env.sh --env "$SYNC_ENV" $DRY_RUN_FLAG

      - name: Summary
        env:
          SYNC_ENV: ${{ github.event.inputs.environment || 'both' }}
          SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "## Secrets Sync Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: $SYNC_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry run: $SYNC_DRY_RUN" >> "$GITHUB_STEP_SUMMARY"
          echo "- Triggered by: $ACTOR" >> "$GITHUB_STEP_SUMMARY"
