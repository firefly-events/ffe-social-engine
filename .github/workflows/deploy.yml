name: Social Engine CI

# Vercel GitHub App handles builds and deploys.
# This workflow handles: Convex schema deploy + Playwright post-deploy verification.

on:
  push:
    branches: [main]
  deployment_status:

permissions:
  contents: read
  id-token: write  # WIF for Convex deploy key

env:
  GCP_PROJECT: ffe-cicd
  WIF_PROVIDER: projects/817549545781/locations/global/workloadIdentityPools/ffe-github-pool/providers/github-actions
  WIF_SERVICE_ACCOUNT: ffe-cicd-deployer@ffe-cicd.iam.gserviceaccount.com

jobs:
  # ── Convex deploy: runs on push to main ─────────────────────────────
  convex-deploy:
    name: Deploy Convex
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            convex-deploy-key:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-convex-deploy-key

      - name: Deploy Convex schema + functions
        env:
          CONVEX_DEPLOY_KEY: ${{ steps.secrets.outputs.convex-deploy-key }}
        run: cd apps/dashboard && npx convex deploy --cmd "echo ok"

  # ── Playwright: runs after Vercel deployment succeeds ───────────────
  playwright:
    name: Playwright E2E
    if: >-
      github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/dashboard
        run: npx playwright install chromium --with-deps

      - name: Run Playwright smoke tests
        working-directory: apps/dashboard
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
        run: npx playwright test --reporter=github

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 1
