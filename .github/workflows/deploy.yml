name: Deploy Social Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  deployment_status: # Run Playwright when a deployment is successful

permissions:
  contents: read
  id-token: write  # Required for WIF
  deployments: read # Required to read deployment info

env:
  GCP_PROJECT: ffe-cicd
  WIF_PROVIDER: projects/817549545781/locations/global/workloadIdentityPools/ffe-github-pool/providers/github-actions
  WIF_SERVICE_ACCOUNT: ffe-cicd-deployer@ffe-cicd.iam.gserviceaccount.com
  VERCEL_ORG_ID: team_9LvKhV1a433uROYAAXl6lbhV
  VERCEL_PROJECT_ID: prj_JSD2sPXbFcJuYQZutwdbV8FGBMj7

jobs:
  sync-env:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Authenticate to GCP via Workload Identity Federation
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      # Pull secrets from GCP Secret Manager
      - id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            clerk-publishable-key:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-clerk-publishable-key
            clerk-secret-key:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-clerk-secret-key
            clerk-webhook-secret:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-clerk-webhook-secret
            clerk-jwt-issuer-domain:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-clerk-jwt-issuer-domain
            convex-url:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-convex-url
            convex-deployment:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-convex-deployment
            convex-deploy-key:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-convex-deploy-key
            zernio-api-key:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-zernio-api-key
            sentry-dsn:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-sentry-dsn
            posthog-key:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-posthog-key
            vertex-ai-sa-key:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-vertex-ai-sa-key
            google-cloud-project:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-google-cloud-project
            google-maps-api-key:ffe-cicd/social-engine-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}-google-maps-key

      - name: Sync Env to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SYNC_CLERK_PUBLISHABLE_KEY: ${{ steps.secrets.outputs.clerk-publishable-key }}
          SYNC_CLERK_SECRET_KEY: ${{ steps.secrets.outputs.clerk-secret-key }}
          SYNC_CLERK_WEBHOOK_SECRET: ${{ steps.secrets.outputs.clerk-webhook-secret }}
          SYNC_CLERK_JWT_ISSUER_DOMAIN: ${{ steps.secrets.outputs.clerk-jwt-issuer-domain }}
          SYNC_CONVEX_URL: ${{ steps.secrets.outputs.convex-url }}
          SYNC_CONVEX_DEPLOYMENT: ${{ steps.secrets.outputs.convex-deployment }}
          SYNC_CONVEX_DEPLOY_KEY: ${{ steps.secrets.outputs.convex-deploy-key }}
          SYNC_ZERNIO_API_KEY: ${{ steps.secrets.outputs.zernio-api-key }}
          SYNC_SENTRY_DSN: ${{ steps.secrets.outputs.sentry-dsn }}
          SYNC_POSTHOG_KEY: ${{ steps.secrets.outputs.posthog-key }}
          SYNC_VERTEX_AI_SA_KEY: ${{ steps.secrets.outputs.vertex-ai-sa-key }}
          SYNC_GOOGLE_CLOUD_PROJECT: ${{ steps.secrets.outputs.google-cloud-project }}
          SYNC_GOOGLE_MAPS_API_KEY: ${{ steps.secrets.outputs.google-maps-api-key }}
        run: |
          ./scripts/sync-vercel.sh ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

  playwright:
    if: github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/dashboard
        run: npx playwright install chromium --with-deps

      - name: Run Playwright smoke tests
        working-directory: apps/dashboard
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
        run: npx playwright test --reporter=github
        continue-on-error: false

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 1
