name: Deploy Social Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  deployment_status: # Run Playwright when a deployment is successful

permissions:
  contents: read
  id-token: write  # Required for WIF
  deployments: read # Required to read deployment info

env:
  GCP_PROJECT: ffe-cicd
  WIF_PROVIDER: projects/817549545781/locations/global/workloadIdentityPools/ffe-github-pool/providers/github-actions
  WIF_SERVICE_ACCOUNT: ffe-cicd-deployer@ffe-cicd.iam.gserviceaccount.com
  VERCEL_ORG_ID: team_9LvKhV1a433uROYAAXl6lbhV
  VERCEL_PROJECT_ID: prj_JSD2sPXbFcJuYQZutwdbV8FGBMj7

jobs:
  sync-env:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Authenticate to GCP via Workload Identity Federation
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Sync Env to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          ./scripts/sync-vercel.sh ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

  playwright:
    if: github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/dashboard
        run: npx playwright install chromium --with-deps

      - name: Run Playwright smoke tests
        working-directory: apps/dashboard
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
        run: npx playwright test --reporter=github
        continue-on-error: false

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 1
